const formatDateTh = (dateString) => {
    if (!dateString) return '-';
    try {
        const date = new Date(dateString);
        if (isNaN(date.getTime())) return dateString;
        return date.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
    } catch { return dateString; }
};

const formatTimeTh = (t) => {
    if (!t) return '';
    if (t.length === 5) return t;
    try {
        const d = new Date(t);
        if (!isNaN(d.getTime())) return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });
        return t.substring(0, 5);
    } catch { return t; }
};

const formatTimeRange = (start, end) => {
    if (!start || !end) return '';
    return `เวลา ${formatTimeTh(start)} - ${formatTimeTh(end)} น.`;
};

// ─────────────────────────────────────────────
// Supabase REST API wrapper (ไม่ใช้ Apps Script)
// ─────────────────────────────────────────────
function createSupabaseClient(url, key) {
    const headers = {
        'apikey': key,
        'Authorization': `Bearer ${key}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
    };

    const request = async (path, method = 'GET', body = null, extra = {}) => {
        const res = await fetch(`${url}/rest/v1/${path}`, {
            method,
            headers: { ...headers, ...extra },
            body: body ? JSON.stringify(body) : undefined
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.message || `HTTP ${res.status}`);
        }
        const text = await res.text();
        return text ? JSON.parse(text) : [];
    };

    return {
        // ─── READ ───
        getDepartments: () => request('departments?select=*&order=name.asc'),
        getPrefixes: () => request('prefixes?select=*&order=name.asc'),
        getSessions: () => request('sessions?select=*&order=date.asc'),
        getRegistrations: () => request('registrations?select=*&order=created_at.asc'),
        getAdmins: () => request('admins?select=username,name'),

        // ─── DEPARTMENTS ───
        addDepartment: (name) => request('departments', 'POST', { id: uuid(), name }),
        updateDepartment: (id, name) => request(`departments?id=eq.${id}`, 'PATCH', { name }),
        deleteDepartment: (id) => request(`departments?id=eq.${id}`, 'DELETE'),
        importDepartments: (items) => request('departments', 'POST', items.map(i => ({ id: uuid(), name: i.name }))),

        // ─── PREFIXES ───
        addPrefix: (name) => request('prefixes', 'POST', { id: uuid(), name }),
        deletePrefix: (id) => request(`prefixes?id=eq.${id}`, 'DELETE'),

        // ─── SESSIONS ───
        addSession: (s) => request('sessions', 'POST', { id: uuid(), ...s }),
        updateSession: (id, s) => request(`sessions?id=eq.${id}`, 'PATCH', s),
        deleteSession: (id) => request(`sessions?id=eq.${id}`, 'DELETE'),
        importSessions: (items) => request('sessions', 'POST', items.map(i => ({ id: uuid(), ...i }))),

        // ─── ADMINS ───
        loginAdmin: async (username, password) => {
            const data = await request(`admins?username=eq.${encodeURIComponent(username)}&password=eq.${encodeURIComponent(password)}&select=username,name`);
            return data.length > 0 ? data[0] : null;
        },
        addAdmin: (a) => request('admins', 'POST', a),
        updateAdmin: (username, data) => request(`admins?username=eq.${encodeURIComponent(username)}`, 'PATCH', data),
        deleteAdmin: (username) => request(`admins?username=eq.${encodeURIComponent(username)}`, 'DELETE'),

        // ─── REGISTRATIONS ───
        register: (payload) => request('registrations', 'POST', {
            id: uuid(), ...payload,
            created_at: new Date().toISOString(),
            attended: false, remark: '', login_status: '', login_remark: ''
        }),
        updateCheckin: (items) => {
            return Promise.all(items.map(r =>
                request(`registrations?id=eq.${r.id}`, 'PATCH', {
                    attended: r.attended,
                    remark: r.remark || ''
                })
            ));
        },
        updateLoginStatus: (items) => {
            return Promise.all(items.map(r =>
                request(`registrations?id=eq.${r.id}`, 'PATCH', {
                    login_status: r.loginStatus || '',
                    login_remark: r.loginRemark || ''
                })
            ));
        },
        countRegistrations: async (sessionId) => {
            const res = await fetch(`${url}/rest/v1/registrations?session_id=eq.${sessionId}&select=id`, {
                headers: { ...headers, 'Prefer': 'count=exact' }
            });
            return parseInt(res.headers.get('content-range')?.split('/')[1] || '0', 10);
        }
    };
}

            const matchTopic = !publicSearchTopic || sess?.topic === publicSearchTopic;

            return matchName && matchTopic && matchSess;

            return matchSearch && matchStatus;

    }, [registrations, userCheckSearch, userCheckFilterStatus, activeTab, adminSubTab]);

        const stats = {};
        departments.forEach(d => { stats[d.name] = { total: 0, attended: 0 }; });
        registrations.forEach(r => {
            const dept = r.department || 'ไม่ระบุ';
            if (!stats[dept]) stats[dept] = { total: 0, attended: 0 };
            stats[dept].total++;
            if (r.attended === true || r.attended === 'true') stats[dept].attended++;
        });
        return Object.entries(stats).map(([name, v]) => ({ name, total: v.total, attended: v.attended, absent: v.total - v.attended })).filter(s => s.total > 0).sort((a, b) => b.total - a.total);
    }, [registrations, departments]);

    const topicStats = useMemo(() => {
        const stats = {};
        sessions.forEach(s => { if (!stats[s.topic]) stats[s.topic] = { total: 0, attended: 0 }; });
        registrations.forEach(r => {
            const sess = sessions.find(s => s.id === r.session_id);
            if (sess) {
                stats[sess.topic].total++;
                if (r.attended === true || r.attended === 'true') stats[sess.topic].attended++;
            }
        });
        return Object.entries(stats).map(([name, v]) => ({ name, total: v.total, attended: v.attended, absent: v.total - v.attended })).filter(s => s.total > 0).sort((a, b) => b.total - a.total);

        if (!file) return;
        setImportStatus(`กำลังอ่านไฟล์...`);
        const reader = new FileReader();
        reader.onload = async (ev) => {
            const text = ev.target?.result;
            const lines = text.split('\n').filter(l => l.trim());
            if (lines.length <= 1) { setImportStatus('ไม่พบข้อมูล'); return; }
            try {
                if (type === 'department') {
                    const items = lines.slice(1).map(l => ({ name: l.replace('\r', '').split(',')[0].trim() })).filter(i => i.name);
                    await db.importDepartments(items);
                } else {
                    const items = lines.slice(1).map(l => {
                        const cols = l.replace('\r', '').split(',');
                        return { topic: cols[0]?.trim(), description: cols[1]?.trim() || '', date: cols[2]?.trim(), start_time: cols[3]?.trim(), end_time: cols[4]?.trim(), max_seats: parseInt(cols[5]?.trim()) || 30 };
                    }).filter(i => i.topic);
                    await db.importSessions(items);
                }
                setImportStatus('นำเข้าข้อมูลสำเร็จ!');
                await fetchAll();
            } catch (e) { setImportStatus('เกิดข้อผิดพลาด: ' + e.message); }
        };
        reader.readAsText(file);
        e.target.value = '';
    };

    const handleDownloadTemplate = (type) => {
        const csv = type === 'department'
            ? "\uFEFFชื่อหน่วยงาน\nแผนกฉุกเฉิน\nฝ่ายบุคคล"
            : "\uFEFFหัวข้ออบรม,รายละเอียด,วันที่ (2024-01-31),เวลาเริ่ม (09:00),เวลาสิ้นสุด (12:00),จำนวนรับ\nอบรมการใช้ระบบ,เบื้องต้น,2024-03-15,09:00,12:00,50";
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `template_${type}.csv`;
        link.click();
    };

    const handleExportCSV = () => {
        const regs = getExportRegs();
        let csv = "\uFEFFลำดับ,ชื่อ-นามสกุล,ตำแหน่ง,หน่วยงาน,ลายเซ็น\n";
        regs.forEach((r, i) => { csv += `${i+1},"${r.prefix}${r.full_name}","${r.position}","${r.department}",\n`; });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = `รายชื่อ_${sessions.find(s => s.id === exportSessionId)?.topic || 'training'}.csv`;
        link.click();
    };

    const handleLogoUpload = (e) => {
        const file = e.target.files?.[0];
        if (file) {
            const reader = new FileReader();
            reader.onloadend = () => setPrintConfig(p => ({ ...p, logo: reader.result }));
            reader.readAsDataURL(file);
        }
    };

    // ─────────────────────────────────────────────
    // CONNECTION SCREEN
    // ─────────────────────────────────────────────
    if (!isConnected) {
        return (
            <div className="min-h-screen bg-gradient-to-br from-emerald-900 via-emerald-800 to-teal-900 flex items-center justify-center p-4">
                <div className="bg-white rounded-3xl shadow-2xl w-full max-w-xl overflow-hidden">
                    <div className="bg-gradient-to-r from-emerald-600 to-teal-600 p-8 text-white text-center">
                        <Icon name="domain" className="text-[56px] mb-3" />
                        <h1 className="text-2xl font-bold">BMS Inventory Training</h1>
                        <p className="text-emerald-100 text-sm mt-1">ระบบลงทะเบียนอบรม — Supabase Edition</p>
                    </div>
                    <div className="p-8">
                        <h2 className="font-bold text-slate-800 mb-2 flex items-center"><Icon name="link" className="mr-2 text-emerald-600"/> ตั้งค่าการเชื่อมต่อ Supabase</h2>
                        <p className="text-slate-500 text-sm mb-6">กรอก URL และ anon key จาก Supabase Project ของคุณ</p>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-xs font-bold text-slate-500 mb-1">Supabase Project URL</label>
                                <input className="w-full border border-slate-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none font-mono" placeholder="https://xxxxxxxxxxxx.supabase.co" value={supabaseUrl} onChange={e => setSupabaseUrl(e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 mb-1">Supabase anon / public key</label>
                                <input className="w-full border border-slate-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none font-mono" placeholder="eyJhbGci..." value={supabaseKey} onChange={e => setSupabaseKey(e.target.value)} />
                            </div>
                            {connectError && <div className="bg-red-50 border border-red-200 text-red-700 text-sm p-3 rounded-xl flex items-start"><Icon name="error" className="mr-2 text-[16px] flex-shrink-0 mt-0.5"/>{connectError}</div>}
                            <button onClick={() => handleConnect()} disabled={isConnecting} className="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-emerald-400 text-white py-3 rounded-xl font-bold text-base flex items-center justify-center transition-colors">
                                {isConnecting ? <><Spinner /><span className="ml-2">กำลังเชื่อมต่อ...</span></> : <><Icon name="link" className="mr-2"/>เชื่อมต่อ Supabase</>}
                            </button>
                        </div>
                        <div className="mt-6 pt-6 border-t border-slate-100">
                            <button onClick={() => setShowSetup(!showSetup)} className="text-sm text-emerald-600 flex items-center hover:underline">
                                <Icon name="code" className="mr-1 text-[16px]"/>{showSetup ? 'ซ่อน' : 'แสดง'} SQL สำหรับสร้างตาราง (รันครั้งแรก)
                            </button>
                            {showSetup && (
                                <div className="mt-3 bg-slate-900 rounded-xl p-4 relative">
                                    <button onClick={() => navigator.clipboard.writeText(SQL_SETUP)} className="absolute top-3 right-3 bg-white/10 hover:bg-white/20 text-white text-xs px-3 py-1 rounded-lg flex items-center">
                                        <Icon name="content_copy" className="mr-1 text-[14px]"/>Copy
                                    </button>
                                    <pre className="text-green-400 text-xs overflow-auto max-h-64 font-mono">{SQL_SETUP}</pre>
                                </div>
                            )}
                        </div>
                        <div className="mt-4 bg-blue-50 border border-blue-200 rounded-xl p-4 text-xs text-blue-700 space-y-1">
                            <p className="font-bold flex items-center"><Icon name="info" className="mr-1 text-[14px]"/>วิธีเริ่มต้น (ฟรี)</p>
                            <p>1. สมัคร <strong>supabase.com</strong> → สร้าง Project ใหม่</p>
                            <p>2. ไปที่ <strong>SQL Editor</strong> → วาง SQL ด้านบน → Run</p>
                            <p>3. ไปที่ <strong>Settings → API</strong> → Copy URL และ anon key</p>
                            <p>4. กรอกค่าด้านบนแล้วกดเชื่อมต่อ</p>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    // ─────────────────────────────────────────────
    // PRINT PREVIEW
    // ─────────────────────────────────────────────
    if (showPrintPreview) {
        const chunks = getChunkedRegs();
        const exportSess = sessions.find(s => s.id === exportSessionId);
        return (
            <div className="fixed inset-0 z-[100] bg-gray-100 overflow-auto flex flex-col items-center" id="print-container">
                <div className="no-print w-full bg-slate-800 text-white p-4 flex justify-between items-center sticky top-0 shadow-lg z-50">
                    <h2 className="text-xl font-bold flex items-center"><Icon name="print" className="mr-2"/> Print Preview</h2>
                    <div className="flex space-x-3">
                        <button onClick={() => window.print()} className="bg-emerald-600 hover:bg-emerald-700 px-6 py-2 rounded-lg flex items-center"><Icon name="print" className="mr-2"/> พิมพ์ / บันทึก PDF</button>
                        <button onClick={() => setShowPrintPreview(false)} className="bg-white/10 hover:bg-white/20 px-6 py-2 rounded-lg flex items-center"><Icon name="close" className="mr-2"/> ปิด</button>
                    </div>
                </div>
                <div>
                    {chunks.map((pageData, pi) => {
                        const empty = Array(25 - pageData.length).fill(null);
                        return (
                            <div key={pi} className="print-page w-[210mm] min-h-[297mm] bg-white p-[15mm] shadow-2xl my-8 mx-auto box-border text-black flex flex-col font-print relative">
                                {chunks.length > 1 && <div className="absolute top-2 right-2 text-xs text-gray-400">หน้า {pi+1}</div>}
                                <div className="border-b-2 border-black pb-3 mb-3 relative min-h-[110px]">
                                    {printConfig.logo && <div className="absolute left-0 top-0"><img src={printConfig.logo} className="h-[70px] object-contain" /></div>}
                                    <div className="text-center pt-12 mb-3"><h2 className="font-print-head">ใบเซ็นชื่อผู้เข้าร่วมอบรมการใช้งานโปรแกรม BMS-INVENTORY</h2></div>
                                    <div className="flex w-full text-sm">
                                        <div className="w-[60%] pr-4 space-y-1">
                                            <div className="flex"><span className="font-bold w-24">สถานพยาบาล:</span>{printConfig.hospitalName}</div>
                                            <div className="flex"><span className="font-bold w-24">ระบบงาน:</span>{exportSess?.topic || '...'}</div>
                                        </div>
                                        <div className="w-[40%] space-y-1">
                                            <div className="flex"><span className="font-bold w-16">วันที่:</span>{formatDateTh(exportSess?.date)}</div>
                                            <div className="flex"><span className="font-bold w-16">วิทยากร:</span>{printConfig.speakerName || '...'}</div>
                                        </div>
                                    </div>
                                </div>
                                <table className="w-full border-collapse border border-black flex-grow table-fixed text-sm">
                                    <thead><tr className="bg-gray-200">
                                        <th className="border border-black px-2 py-1 text-center font-print" style={{width:'6%'}}>ลำดับ</th>
                                        <th className="border border-black px-2 py-1 font-print" style={{width:'32%'}}>ชื่อ-นามสกุล</th>
                                        <th className="border border-black px-2 py-1 font-print" style={{width:'24%'}}>ตำแหน่ง</th>
                                        <th className="border border-black px-2 py-1 font-print" style={{width:'23%'}}>แผนก</th>
                                        <th className="border border-black px-2 py-1 font-print" style={{width:'15%'}}>ลายมือชื่อ</th>
                                    </tr></thead>
                                    <tbody>
                                        {pageData.map((r, idx) => (
                                            <tr key={r.id} className="h-[9.5mm]">
                                                <td className="border border-black px-2 text-center font-print">{pi*25+idx+1}</td>
                                                <td className="border border-black px-2 font-print">{r.prefix}{r.full_name}</td>
                                                <td className="border border-black px-2 font-print">{r.position}</td>
                                                <td className="border border-black px-2 font-print">{r.department}</td>
                                                <td className="border border-black px-2 font-print"></td>
                                            </tr>
                                        ))}
                                        {empty.map((_, idx) => (
                                            <tr key={'e'+idx} className="h-[9.5mm]">
                                                <td className="border border-black px-2 text-center font-print">{pi*25+pageData.length+idx+1}</td>
                                                <td className="border border-black px-2 font-print"></td>
                                                <td className="border border-black px-2 font-print"></td>
                                                <td className="border border-black px-2 font-print"></td>
                                                <td className="border border-black px-2 font-print"></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                <div className="flex justify-between pt-5 mt-auto px-8">
                                    <div className="text-center w-5/12 text-sm">
                                        <div className="border-b border-dashed border-black w-3/4 mx-auto mb-1"></div>
                                        <p className="font-bold">({printConfig.bmsSignerName || '...................................'})</p>
                                        <p>{printConfig.bmsSignerPosition}</p>
                                        <p>{printConfig.bmsSignerCompany}</p>
                                    </div>
                                    <div className="text-center w-5/12 text-sm">
                                        <div className="border-b border-dashed border-black w-3/4 mx-auto mb-1"></div>
                                        <p className="font-bold">({printConfig.hospitalSignerName || '...................................'})</p>
                                        <p>{printConfig.hospitalSignerPosition}</p>
                                        <p>{printConfig.hospitalSignerOrg}</p>
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            </div>
        );
    }

    // ─────────────────────────────────────────────
    // MAIN UI
    // ─────────────────────────────────────────────
    const tabs = [
        { id: 'register', icon: 'group', text: 'ลงทะเบียน' },
        { id: 'check_status', icon: 'description', text: 'ตรวจสอบรายชื่อ' },
        { id: 'dashboard', icon: 'bar_chart', text: 'สถิติ' },
        { id: 'unregistered', icon: 'campaign', text: 'หน่วยงานตกหล่น' },
        { id: 'admin', icon: 'settings', text: 'ผู้ดูแล' },
    ];

    return (
        <div className="min-h-screen flex flex-col">
            {/* HEADER */}
            <header className="bg-gradient-to-r from-emerald-700 to-emerald-900 text-white shadow-lg sticky top-0 z-50 no-print">
                <div className="container mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-3">
                    <div className="flex items-center space-x-3">
                        <div className="bg-white/20 p-2 rounded-lg"><Icon name="domain" className="text-[28px]"/></div>
                        <div>
                            <h1 className="text-lg md:text-2xl font-bold">BMS INVENTORY</h1>
                            <p className="text-emerald-100 text-xs flex items-center">
                                <span className="w-2 h-2 bg-green-400 rounded-full inline-block mr-1"></span>
                                เชื่อมต่อ Supabase แล้ว
                                <button onClick={() => { localStorage.removeItem('sb_url'); localStorage.removeItem('sb_key'); setIsConnected(false); setDb(null); setCurrentUser(null); }} className="ml-3 text-red-300 hover:text-red-100 text-xs">ตัดการเชื่อมต่อ</button>
                            </p>
                        </div>
                    </div>
                    <nav className="flex space-x-1 bg-emerald-800/50 p-1 rounded-xl overflow-x-auto">
                        {tabs.map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center px-3 py-2 rounded-lg text-sm whitespace-nowrap transition-all ${activeTab === tab.id ? 'bg-white text-emerald-900 shadow-md font-semibold' : 'text-emerald-100 hover:bg-white/10'}`}>
                                <Icon name={tab.icon} className="text-[16px] mr-1.5"/>{tab.text}
                            </button>
                        ))}
                    </nav>
                </div>
            </header>

            <main className="container mx-auto px-4 py-6 flex-grow">

                {/* ─── REGISTER ─── */}
                {activeTab === 'register' && (
                    <div className="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm border overflow-hidden">
                        <div className="bg-emerald-600 px-6 py-4 flex justify-between items-center">
                            <h2 className="text-white font-semibold text-lg flex items-center"><Icon name="group" className="mr-2"/>ลงทะเบียนอบรม</h2>
                            {loading && <Spinner/>}
                        </div>
                        <div className="p-6 md:p-8">
                            {submitStatus === 'success' ? (
                                <div className="text-center py-12">
                                    <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="check_circle" className="text-[40px]"/></div>
                                    <h3 className="text-2xl font-bold text-green-700 mb-2">ลงทะเบียนสำเร็จ!</h3>
                                    <p className="text-slate-500 mb-6">บันทึกข้อมูลเรียบร้อยแล้ว</p>
                                    <button onClick={() => setSubmitStatus('idle')} className="bg-emerald-600 text-white px-6 py-2 rounded-lg hover:bg-emerald-700">กลับหน้าแรก</button>
                                </div>
                            ) : (
                                <form onSubmit={handleRegister} className="space-y-5">
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                        <div><label className="block text-sm font-medium mb-1">คำนำหน้า <span className="text-red-500">*</span></label>
                                            <select className="w-full rounded-lg border p-2.5 outline-none focus:ring-2 focus:ring-emerald-500" value={formData.prefix} onChange={e => setFormData({...formData, prefix: e.target.value})}>
                                                <option value="">-- เลือก --</option>
                                                {prefixes.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                                            </select>
                                        </div>
                                        <div className="md:col-span-3"><label className="block text-sm font-medium mb-1">ชื่อ-นามสกุล <span className="text-red-500">*</span></label>
                                            <input type="text" className="w-full rounded-lg border p-2.5 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="ระบุชื่อและนามสกุลจริง" value={formData.fullName} onChange={e => setFormData({...formData, fullName: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div><label className="block text-sm font-medium mb-1">ตำแหน่ง <span className="text-red-500">*</span></label>
                                            <input type="text" className="w-full rounded-lg border p-2.5 outline-none focus:ring-2 focus:ring-emerald-500" value={formData.position} onChange={e => setFormData({...formData, position: e.target.value})} />
                                        </div>
                                        <div><label className="block text-sm font-medium mb-1">หน่วยงาน <span className="text-red-500">*</span></label>
                                            <select className="w-full rounded-lg border p-2.5 outline-none focus:ring-2 focus:ring-emerald-500" value={formData.department} onChange={e => setFormData({...formData, department: e.target.value})}>
                                                <option value="">-- เลือกหน่วยงาน --</option>
                                                {departments.map(d => <option key={d.id} value={d.name}>{d.name}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="pt-4 border-t">
                                        <div className="mb-4">
                                            <label className="block text-sm font-bold text-slate-700 mb-2"><Icon name="filter_alt" className="text-emerald-600 text-[16px] mr-1"/>1. เลือกหัวข้อการอบรม <span className="text-red-500">*</span></label>
                                            <select className="w-full rounded-lg border p-3 bg-slate-50 outline-none focus:ring-2 focus:ring-emerald-500" value={selectedTopic} onChange={e => { setSelectedTopic(e.target.value); setFormData({...formData, sessionId: ''}); }}>
                                                <option value="">-- กรุณาเลือกหัวข้อ --</option>
                                                {uniqueTopics.map(t => <option key={t} value={t}>{t}</option>)}
                                            </select>
                                        </div>
                                        {selectedTopic && (
                                            <div className="space-y-3">
                                                <label className="block text-sm font-bold text-slate-700 mb-2"><Icon name="calendar_month" className="text-emerald-600 text-[16px] mr-1"/>2. เลือกรอบอบรม <span className="text-red-500">*</span></label>
                                                {filteredSessions.length === 0
                                                    ? <p className="text-slate-400 text-center italic p-4 border border-dashed rounded-lg">ไม่พบรอบอบรม</p>
                                                    : filteredSessions.map(sess => {
                                                        const isFull = sess.registeredCount >= sess.max_seats;
                                                        const { pct, color } = calcProgress(sess.registeredCount, sess.max_seats);
                                                        return (
                                                            <label key={sess.id} className={`relative block border rounded-xl p-4 transition-all ${isFull ? 'opacity-60 bg-slate-100 cursor-not-allowed' : 'cursor-pointer hover:border-emerald-300'} ${formData.sessionId === sess.id ? 'border-emerald-500 bg-emerald-50' : ''}`}>
                                                                <input type="radio" name="session" value={sess.id} disabled={isFull} checked={formData.sessionId === sess.id} onChange={e => setFormData({...formData, sessionId: e.target.value})} className="absolute top-4 right-4 h-5 w-5"/>
                                                                <div className="pr-8">
                                                                    <div className="font-bold text-lg mb-1">{formatDateTh(sess.date)}</div>
                                                                    <div className="text-sm text-slate-600 mb-3"><span className="bg-slate-100 px-2 py-1 rounded inline-flex items-center"><Icon name="schedule" className="text-[14px] mr-1"/>{formatTimeRange(sess.start_time, sess.end_time)}</span></div>
                                                                    <div className="flex justify-between text-xs mb-1">
                                                                        <span className={isFull ? 'text-red-600 font-bold' : 'text-slate-500'}>{isFull ? '❌ เต็มแล้ว' : `ว่าง ${Math.max(0, sess.max_seats - sess.registeredCount)} ที่นั่ง`}</span>
                                                                        <span>{sess.registeredCount}/{sess.max_seats} คน</span>
                                                                    </div>
                                                                    <div className="w-full bg-slate-200 rounded-full h-2"><div className={`h-2 rounded-full ${color}`} style={{width: `${pct}%`}}></div></div>
                                                                </div>
                                                            </label>
                                                        );
                                                    })}
                                            </div>
                                        )}
                                    </div>
                                    {errorMsg && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm flex items-center"><Icon name="error" className="text-[16px] mr-2"/>{errorMsg}</div>}
                                    <button type="submit" disabled={submitStatus === 'submitting'} className="w-full font-bold py-3 rounded-xl text-white bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-300 disabled:text-slate-500 flex items-center justify-center">
                                        {submitStatus === 'submitting' ? <><Spinner/><span className="ml-2">กำลังบันทึก...</span></> : 'ยืนยันการลงทะเบียน'}
                                    </button>
                                </form>
                            )}
                        </div>
                    </div>
                )}

                {/* ─── CHECK STATUS ─── */}
                {activeTab === 'check_status' && (
                    <div className="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm border overflow-hidden">
                        <div className="bg-emerald-600 px-6 py-4"><h2 className="text-white font-semibold text-lg flex items-center"><Icon name="description" className="mr-2"/>ตรวจสอบรายชื่อ</h2></div>
                        <div className="p-6">
                            <div className="space-y-4 mb-6 bg-slate-50 p-4 rounded-lg border">
                                <div><label className="block text-xs font-bold text-slate-500 mb-2">ค้นหาตามชื่อ</label>
                                    <div className="relative"><Icon name="search" className="absolute left-3 top-2.5 text-slate-400 text-[16px]"/><input type="text" className="w-full border rounded-lg pl-9 p-2 text-sm" placeholder="พิมพ์ชื่อ..." value={publicSearchName} onChange={e => setPublicSearchName(e.target.value)}/></div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="block text-xs font-bold text-slate-500 mb-2">กรองตามหัวข้อ</label>

                                                                    <td className="px-4 py-3 text-center text-slate-500">{i+1}</td>
                                                                    <td className="px-4 py-3 font-medium">{r.prefix}{r.full_name}</td>
                                                                    <td className="px-4 py-3 text-slate-600"><div>{r.position}</div><div className="text-xs text-slate-400">{r.department}</div></td>
                                                                    <td className="px-4 py-3 text-center">
                                                                        <label className="relative inline-flex items-center cursor-pointer">
                                                                            <input type="checkbox" className="sr-only peer" checked={!!r.attended} onChange={e => setCheckinList(prev => prev.map(x => x.id === r.id ? {...x, attended: e.target.checked} : x))}/>
                                                                            <div className="w-11 h-6 bg-slate-200 peer-focus:ring-2 peer-focus:ring-emerald-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
                                                                        </label>
                                                                    </td>
                                                                    <td className="px-4 py-3"><input type="text" className="border rounded-lg px-3 py-2 w-full text-sm outline-none focus:border-emerald-500" placeholder="หมายเหตุ..." value={r.remark||''} onChange={e => setCheckinList(prev => prev.map(x => x.id === r.id ? {...x, remark: e.target.value} : x))}/></td>
                                                                </tr>
                                                            ))}
                                                            {checkinList.length === 0 && <tr><td colSpan={5} className="text-center py-8 text-slate-400">ยังไม่มีผู้ลงทะเบียนในรอบนี้</td></tr>}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* ─── USER CHECK ─── */}
                            {adminSubTab === 'user_check' && (
                                <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
                                    <div className="bg-indigo-600 px-6 py-4 flex justify-between items-center">
                                        <h2 className="text-white font-semibold text-lg flex items-center"><Icon name="verified_user" className="mr-2"/>ตรวจสอบสิทธิ์ผู้ใช้งาน</h2>
                                        <button onClick={() => fetchAll(true)} className="bg-white/20 hover:bg-white/30 text-white px-3 py-1.5 rounded-lg text-xs flex items-center"><Icon name="refresh" className="text-[14px] mr-1"/>รีโหลด</button>
                                    </div>
                                    <div className="p-6">
                                        <div className="flex flex-col md:flex-row gap-4 mb-6 bg-slate-50 p-4 rounded-xl border items-center">
                                            <div className="relative flex-1 w-full"><Icon name="search" className="absolute left-3 top-2.5 text-slate-400 text-[20px]"/>
                                                <input type="text" className="w-full border rounded-lg pl-10 p-2.5 text-sm outline-none" placeholder="ค้นหาชื่อ หรือ หน่วยงาน..." value={userCheckSearch} onChange={e => setUserCheckSearch(e.target.value)}/>
                                            </div>
                                            <select className="border rounded-lg p-2.5 text-sm outline-none bg-white min-w-[160px]" value={userCheckFilterStatus} onChange={e => setUserCheckFilterStatus(e.target.value)}>
                                                <option value="">-- ทุกสถานะ --</option>
                                                <option value="has_login">✅ มี Login</option>
                                                <option value="no_login">⚠️ ไม่มี Login</option>
                                                <option value="disabled">🚫 ปิดใช้งาน</option>
                                                <option value="empty">❓ ยังไม่ระบุ</option>
                                            </select>
                                            <button onClick={handleSaveUserCheck} disabled={isSavingUserCheck} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg flex items-center text-sm shadow-md disabled:opacity-50 whitespace-nowrap">
                                                {isSavingUserCheck ? <><Spinner/><span className="ml-2">บันทึก...</span></> : <><Icon name="save" className="mr-2"/>บันทึกสถานะ</>}
                                            </button>
                                        </div>
                                        <div className="overflow-x-auto border rounded-xl max-h-[600px] overflow-y-auto">
                                            <table className="w-full text-sm">
                                                <thead className="bg-slate-100 sticky top-0 z-10"><tr>
                                                    <th className="px-4 py-3 text-center w-12">#</th>
                                                    <th className="px-4 py-3">ชื่อ-นามสกุล</th>
                                                    <th className="px-4 py-3">ตำแหน่ง/หน่วยงาน</th>
                                                    <th className="px-4 py-3 w-48">สถานะ Login</th>
                                                    <th className="px-4 py-3">หมายเหตุ</th>
                                                </tr></thead>
                                                <tbody className="divide-y">
                                                    {userCheckList.map((r, i) => (
                                                        <tr key={r.id} className="hover:bg-slate-50">
                                                            <td className="px-4 py-3 text-center text-slate-500">{i+1}</td>
                                                            <td className="px-4 py-3 font-medium">{r.prefix}{r.full_name}</td>
                                                            <td className="px-4 py-3 text-slate-600"><div>{r.position}</div><div className="text-xs text-slate-400">{r.department}</div></td>
                                                            <td className="px-4 py-3">
                                                                <select className={`w-full border rounded-lg p-2 text-sm outline-none ${r.loginStatus==='has_login'?'bg-green-50 border-green-200 text-green-700':r.loginStatus==='no_login'?'bg-yellow-50 border-yellow-200 text-yellow-700':r.loginStatus==='disabled'?'bg-red-50 border-red-200 text-red-700':'bg-white border-slate-300'}`}
                                                                    value={r.loginStatus||''} onChange={e => setUserCheckList(prev => prev.map(x => x.id === r.id ? {...x, loginStatus: e.target.value} : x))}>
                                                                    <option value="">- ระบุสถานะ -</option>
                                                                    <option value="has_login">✅ มี Login แล้ว</option>
                                                                    <option value="no_login">⚠️ ไม่มี Login</option>
                                                                    <option value="disabled">🚫 ปิดการใช้งาน</option>
                                                                </select>
                                                            </td>
                                                            <td className="px-4 py-3"><input type="text" className="border rounded-lg px-3 py-2 w-full text-sm outline-none" placeholder="หมายเหตุ..." value={r.loginRemark||''} onChange={e => setUserCheckList(prev => prev.map(x => x.id === r.id ? {...x, loginRemark: e.target.value} : x))}/></td>
                                                        </tr>
                                                    ))}
                                                    {userCheckList.length === 0 && <tr><td colSpan={5} className="text-center py-8 text-slate-400">ไม่พบรายชื่อ</td></tr>}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ─── EXPORT / PRINT ─── */}
                            {adminSubTab === 'export' && (
                                <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
                                    <div className="bg-emerald-600 px-6 py-4"><h2 className="text-white font-semibold text-lg flex items-center"><Icon name="table_view" className="mr-2"/>พิมพ์รายชื่อ (Export)</h2></div>
                                    <div className="p-6">
                                        {/* Print config */}
                                        <div className="mb-8 border bg-slate-50 p-6 rounded-xl">
                                            <h3 className="font-bold mb-4 flex items-center"><Icon name="settings_applications" className="mr-2 text-emerald-600"/>ตั้งค่าหัวกระดาษ</h3>
                                            <div className="grid md:grid-cols-2 gap-4">
                                                <div><label className="block text-xs font-bold text-slate-500 mb-1">ชื่อหน่วยงาน/โรงพยาบาล</label><input className="w-full border rounded-lg p-2 text-sm outline-none" value={printConfig.hospitalName} onChange={e => setPrintConfig({...printConfig, hospitalName: e.target.value})}/></div>
                                                <div><label className="block text-xs font-bold text-slate-500 mb-1">ชื่อวิทยากร</label><input className="w-full border rounded-lg p-2 text-sm outline-none" value={printConfig.speakerName} onChange={e => setPrintConfig({...printConfig, speakerName: e.target.value})}/></div>
                                                <div className="md:col-span-2">
                                                    <label className="block text-xs font-bold text-slate-500 mb-2">Logo</label>
                                                    <label className="cursor-pointer bg-white border hover:bg-slate-100 text-slate-700 px-4 py-2 rounded-lg text-sm flex items-center w-fit shadow-sm">
                                                        <Icon name="image" className="mr-2"/>อัปโหลดรูปภาพ<input type="file" accept="image/*" className="hidden" onChange={handleLogoUpload}/>
                                                    </label>
                                                    {printConfig.logo && <span className="mt-2 text-xs text-green-700 flex items-center"><Icon name="check_circle" className="text-[14px] mr-1"/>มีรูปภาพแล้ว</span>}
                                                </div>
                                            </div>
                                            <div className="grid md:grid-cols-2 gap-4 mt-4 pt-4 border-t">
                                                <div className="bg-white p-4 rounded-lg border space-y-2">
                                                    <h4 className="text-sm font-bold text-emerald-700">ผู้ลงนาม (ฝั่ง BMS)</h4>
                                                    <input className="w-full border rounded-lg p-2 text-sm outline-none" placeholder="ชื่อ-นามสกุล" value={printConfig.bmsSignerName} onChange={e => setPrintConfig({...printConfig, bmsSignerName: e.target.value})}/>
                                                    <input className="w-full border rounded-lg p-2 text-sm outline-none" placeholder="ตำแหน่ง" value={printConfig.bmsSignerPosition} onChange={e => setPrintConfig({...printConfig, bmsSignerPosition: e.target.value})}/>
                                                    <input className="w-full border rounded-lg p-2 text-sm outline-none" placeholder="บริษัท" value={printConfig.bmsSignerCompany} onChange={e => setPrintConfig({...printConfig, bmsSignerCompany: e.target.value})}/>
                                                </div>
                                                <div className="bg-white p-4 rounded-lg border space-y-2">
                                                    <h4 className="text-sm font-bold text-blue-700">ผู้ลงนาม (ฝั่งโรงพยาบาล)</h4>
                                                    <input className="w-full border rounded-lg p-2 text-sm outline-none" placeholder="ชื่อ-นามสกุล" value={printConfig.hospitalSignerName} onChange={e => setPrintConfig({...printConfig, hospitalSignerName: e.target.value})}/>
                                                    <input className="w-full border rounded-lg p-2 text-sm outline-none" placeholder="ตำแหน่ง" value={printConfig.hospitalSignerPosition} onChange={e => setPrintConfig({...printConfig, hospitalSignerPosition: e.target.value})}/>
                                                    <input className="w-full border rounded-lg p-2 text-sm outline-none" placeholder="หน่วยงาน" value={printConfig.hospitalSignerOrg} onChange={e => setPrintConfig({...printConfig, hospitalSignerOrg: e.target.value})}/>
                                                </div>
                                            </div>
                                        </div>
                                        {/* Filter */}
                                        <div className="grid md:grid-cols-2 gap-4 mb-6">
                                            <div><label className="block text-xs font-bold text-slate-500 mb-2">1. หัวข้ออบรม</label>
                                                <select className="w-full border rounded-lg p-2.5 text-sm outline-none" value={exportTopic} onChange={e => { setExportTopic(e.target.value); setExportSessionId(''); }}>
                                                    <option value="">-- เลือกหัวข้อ --</option>{uniqueTopics.map(t => <option key={t} value={t}>{t}</option>)}
                                                </select>
                                            </div>
                                            <div><label className="block text-xs font-bold text-slate-500 mb-2">2. รอบวันที่</label>
                                                <select className="w-full border rounded-lg p-2.5 text-sm outline-none" value={exportSessionId} onChange={e => setExportSessionId(e.target.value)} disabled={!exportTopic}>
                                                    <option value="">-- เลือกรอบ --</option>
                                                    {sessions.filter(s => s.topic === exportTopic).map(s => <option key={s.id} value={s.id}>{formatDateTh(s.date)} ({formatTimeRange(s.start_time, s.end_time)})</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        {exportSessionId && (
                                            <div>
                                                <div className="flex justify-between items-center mb-4">
                                                    <h3 className="font-bold flex items-center"><Icon name="groups" className="mr-2 text-emerald-600"/>ตัวอย่างรายชื่อ ({getExportRegs().length} คน)</h3>
                                                    <div className="flex space-x-3">
                                                        <button onClick={() => setShowPrintPreview(true)} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg flex items-center text-sm shadow-md"><Icon name="print" className="mr-2"/>พิมพ์เอกสาร</button>
                                                        <button onClick={handleExportCSV} className="bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-lg flex items-center text-sm shadow-md"><Icon name="download" className="mr-2"/>โหลด Excel</button>
                                                    </div>
                                                </div>
                                                <div className="overflow-x-auto border rounded-xl max-h-[500px] overflow-y-auto">
                                                    <table className="w-full text-sm">
                                                        <thead className="bg-slate-100 sticky top-0 z-10"><tr>
                                                            <th className="px-4 py-3 text-center w-12">ลำดับ</th>
                                                            <th className="px-4 py-3">ชื่อ-นามสกุล</th>
                                                            <th className="px-4 py-3">ตำแหน่ง</th>
                                                            <th className="px-4 py-3">หน่วยงาน</th>
                                                        </tr></thead>
                                                        <tbody className="divide-y">
                                                            {getExportRegs().map((r, i) => (
                                                                <tr key={r.id} className="hover:bg-slate-50">
                                                                    <td className="px-4 py-3 text-center text-slate-500">{i+1}</td>
                                                                    <td className="px-4 py-3 font-medium">{r.prefix}{r.full_name}</td>
                                                                    <td className="px-4 py-3 text-slate-600">{r.position}</td>
                                                                    <td className="px-4 py-3 text-slate-600">{r.department}</td>
                                                                </tr>
                                                            ))}
                                                            {getExportRegs().length === 0 && <tr><td colSpan={4} className="text-center py-8 text-slate-400">ยังไม่มีผู้ลงทะเบียนในรอบนี้</td></tr>}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    )
                )}
            </main>

            {/* ─── STAT MODAL ─── */}
            {statDetail && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[80vh] flex flex-col overflow-hidden">
                        <div className="p-4 border-b bg-emerald-600 text-white flex justify-between items-center">
                            <h3 className="font-bold text-lg flex items-center"><Icon name="list_alt" className="mr-2"/>รายชื่อ: {statDetail.name} <span className="ml-2 text-sm bg-emerald-700 px-2 py-0.5 rounded-full">{statDetailList.length} คน</span></h3>
                            <button onClick={() => setStatDetail(null)} className="p-1 hover:bg-emerald-700 rounded-full"><Icon name="close"/></button>
                        </div>
                        <div className="overflow-y-auto">
                            <table className="w-full text-sm">
                                <thead className="bg-slate-50 sticky top-0 shadow-sm z-10"><tr>
                                    <th className="px-4 py-3 text-center w-12">ลำดับ</th>
                                    <th className="px-4 py-3">ชื่อ-นามสกุล</th>
                                    <th className="px-4 py-3">หัวข้ออบรม</th>
                                    <th className="px-4 py-3 text-center w-32">สถานะ</th>
                                </tr></thead>
                                <tbody className="divide-y">
                                    {statDetailList.map((r, i) => {
                                        const sess = sessions.find(s => s.id === r.session_id);
                                        const isAtt = r.attended === true || r.attended === 'true';
                                        return <tr key={r.id} className="hover:bg-slate-50">
                                            <td className="px-4 py-3 text-center text-slate-500">{i+1}</td>
                                            <td className="px-4 py-3"><div className="font-medium">{r.prefix}{r.full_name}</div><div className="text-xs text-slate-500">{r.position} | {r.department}</div></td>
                                            <td className="px-4 py-3">{sess ? <><div>{sess.topic}</div><div className="text-xs text-slate-500">{formatDateTh(sess.date)}</div></> : '-'}</td>
                                            <td className="px-4 py-3 text-center">{isAtt ? <span className="inline-flex items-center text-green-700 bg-green-50 px-2.5 py-1 rounded-full text-xs font-bold border border-green-200"><Icon name="check_circle" className="text-[14px] mr-1"/>เข้าร่วมแล้ว</span> : <span className="inline-flex items-center text-rose-600 bg-rose-50 px-2.5 py-1 rounded-full text-xs font-bold border border-rose-200"><Icon name="cancel" className="text-[14px] mr-1"/>ไม่เข้าร่วม</span>}</td>
                                        </tr>;
                                    })}
                                    {statDetailList.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-slate-400">ไม่มีข้อมูล</td></tr>}
                                </tbody>
                            </table>
                        </div>
                        <div className="p-4 border-t bg-slate-50 text-right">
                            <button onClick={() => setStatDetail(null)} className="px-6 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-medium">ปิด</button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
